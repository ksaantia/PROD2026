# This file is auto-generated by DevPlatform for further customizing as you wish.
stages:
  - build
  - test
  - deploy

test:
  stage: test
  script:
    - echo 'ok'

deploy_to_server:
  stage: deploy
  # Используем готовый образ, где SSH и SCP вшиты изначально. Никакого интернета для сборки!
  image: instrumentisto/rsync-ssh:latest
  only:
    - master
    - main

  before_script:
    # Создаем папку для ключа (команды apk add здесь больше НЕТ)
    mkdir -p ~/.ssh && chmod 700 ~/.ssh
    
    # ФИКС КЛЮЧА: убираем Windows-переносы строк (\r) и принудительно добавляем пустую строку в конец
    - cat "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - echo "" >> ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    # Генерируем .env для бэкенда
    - echo "DB_HOST=${DB_HOST}" >> backend.env
    - echo "DB_PORT=${DB_PORT}" >> backend.env
    - echo "DB_USER=${DB_USER}" >> backend.env
    - echo "DB_PASSWORD=${DB_PASSWORD}" >> backend.env
    - echo "DB_NAME=${DB_NAME}" >> backend.env
    - echo "DB_SSLMODE=${DB_SSLMODE}" >> backend.env
    - echo "MINIO_ENDPOINT=${MINIO_ENDPOINT}" >> backend.env
    - echo "MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}" >> backend.env
    - echo "MINIO_SECRET_KEY=${MINIO_SECRET_KEY}" >> backend.env
    - echo "MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}" >> backend.env
    - echo "MINIO_USE_SSL=${MINIO_USE_SSL}" >> backend.env

    # Генерируем .env для фронтенда
    - echo "VITE_API_URL=http://${DEPLOY_HOST}:8080/api" >> frontend.env

  script:
    # 1. Надежно передаем env-файлы через SSH-поток
    - cat backend.env | ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cat > /home/ubuntu/app/backend/.env"
    - cat frontend.env | ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cat > /home/ubuntu/app/frontend/.env"
    
    # 2. Обновляем репозиторий на сервере и перезапускаем контейнеры
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        cd /home/ubuntu/app && \
        git pull origin master || git pull origin main && \
        docker-compose up --build -d
      "